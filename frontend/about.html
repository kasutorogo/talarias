<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>About Talarias</title>
  <style>
    :root {
      --bg: radial-gradient(circle at top, rgba(92, 63, 20, 0.55) 0%, rgba(32, 22, 12, 0.97) 58%, rgba(20, 13, 8, 0.99) 100%);
      --panel: rgba(38, 27, 16, 0.94);
      --text: #f7edd7;
      --muted: #ddb977;
      --line: #8f6a33;
      --accent: #f1c66d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .card {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      padding: 26px 24px;
      text-align: center;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
    }

    .icon {
      width: 72px;
      height: 72px;
      display: block;
      margin: 0 auto 16px;
      border-radius: 18px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
    }

    h1 {
      font-size: 24px;
      line-height: 1.2;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .version {
      color: var(--accent);
      font-size: 14px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <main class="card">
    <img class="icon" src="/icon.png" alt="Talarias icon" />
    <h1 id="appName">Talarias</h1>
    <p class="version" id="appVersion">Version 0.1.0</p>
    <p class="subtitle" id="appSubtitle">Template workflow launcher</p>
  </main>
  <script type="module" src="./about.js"></script>
</body>
</html>
