<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Talarias</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <input id="searchInput" type="text" autocomplete="off" placeholder="Search templates..." />
      <div id="results" class="results hidden"></div>
      <div id="editorPanel" class="editor-panel hidden">
        <textarea id="previewEditor"></textarea>
        <div class="editor-bottom">
          <div class="bind-group">
            <input id="aliasInput" type="text" placeholder="Alias" spellcheck="false" title="Custom search keyword" />
            <input id="shortcutInput" type="text" placeholder="Shortcut" spellcheck="false" title="Press a key combination" />
            <span id="shortcutStatus"></span>
          </div>
          <button id="copyBtn">Copy</button>
          <button id="themeToggle" class="theme-toggle" title="Toggle theme">&#9790;</button>
        </div>
      </div>
      <div class="folder-row">
        <button id="rootFolderBtn" type="button" title="Choose templates folder">Templates Folder</button>
        <select id="folderSelect"></select>
      </div>
      <span id="status"></span>
    </div>
    <script type="module" src="./renderer.js"></script>
  </body>
</html>
